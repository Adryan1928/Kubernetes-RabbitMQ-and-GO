services:
  postgres:
    image: postgres:16-alpine
    container_name: studyflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studyflow}
      POSTGRES_USER: ${POSTGRES_USER:-studyflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyflow} -d ${POSTGRES_DB:-studyflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studyflow-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: studyflow-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://studyflow:studyflow@postgres:5432/studyflow}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-studyflow:plans}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://studyflow:studyflow@postgres:5432/studyflow}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-studyflow:plans}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyflow-frontend
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8000}
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
