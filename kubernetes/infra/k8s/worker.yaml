apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: studyflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: studyflow-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: studyflow-config
            - secretRef:
                name: studyflow-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
